name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      # The package needs swift-tools 6.3; pick the newest Xcode on the image.
      - name: Select newest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"

      - name: Swift version
        run: swift --version

      - name: Build (warnings are errors)
        run: swift build -Xswiftc -warnings-as-errors

      - name: Test
        run: swift test
